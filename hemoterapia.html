<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital do Prenda — Hemoterapia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#F0F2F5;--surface:#FFFFFF;--surface2:#F8F9FB;--navy:#FFFFFF;--navy2:#F8F9FB;--navy3:#F0F2F5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --blue:#1a56db;--blue2:#1447c0;--blue3:#3b82f6;
  --rose:#ec4899;--rose2:#f9a8d4;--rose-d:#9d174d;
  --cyan:#06b6d4;
  --green:#059669;--amber:#d97706;--purple:#7c3aed;
  --red:#dc2626;--orange:#fb923c;
  --text:#1A1A2E;--text-muted:#6B7280;--muted:#6B7280;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.10);
  --nav-w:232px;--hdr-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{display:none;}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--hdr-h);padding:0 20px;
  border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;
  background:#ffffff;box-shadow:0 1px 4px rgba(0,0,0,0.08);gap:8px;}
.logo-text h1{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:var(--blue);}
.logo-text p{font-size:.44rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.hdr-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.hdr-date{display:flex;align-items:center;gap:6px;}
.hdr-date label{font-size:.48rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.hdr-date input[type=date]{background:#ffffff;border:1px solid var(--border2);color:var(--text);
  font-family:'DM Mono',monospace;font-size:.68rem;padding:5px 9px;border-radius:6px;outline:none;cursor:pointer;}
.hdr-date input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,0.12);}
.clock-b{font-size:.66rem;color:var(--blue);background:rgba(26,86,219,0.07);border:1px solid rgba(26,86,219,0.18);padding:5px 10px;border-radius:6px;}
.sync-info{font-size:.5rem;color:var(--green);background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.22);padding:4px 9px;border-radius:5px;white-space:nowrap;}
.btn-h{padding:6px 11px;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.56rem;
  font-weight:700;letter-spacing:.8px;text-transform:uppercase;transition:all .2s;border:none;}
.btn-save{background:var(--blue);color:#fff;}.btn-save:hover{background:var(--blue2);}
.btn-out{background:transparent;border:1px solid currentColor!important;}
.btn-out.pdf{color:var(--blue);}.btn-out.pdf:hover{background:var(--blue);color:#fff;}
.btn-out.bk{color:var(--purple);}.btn-out.bk:hover{background:var(--purple);color:#fff;}
.btn-out.rs{color:var(--orange);}.btn-out.rs:hover{background:var(--orange);color:#fff;}

/* ── LAYOUT ── */
.app-shell{display:flex;padding-top:var(--hdr-h);min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:var(--hdr-h);left:0;bottom:0;width:var(--nav-w);
  background:#ffffff;border-right:1px solid var(--border2);
  overflow-y:auto;z-index:100;display:flex;flex-direction:column;box-shadow:1px 0 4px rgba(0,0,0,0.04);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);}
.sb-hdr{padding:11px 14px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#ffffff;}
.sb-hdr span{font-family:'Syne',sans-serif;font-size:.48rem;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--muted);}
.nav-list{padding:6px 8px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;
  cursor:pointer;transition:all .18s;user-select:none;border:1px solid transparent;}
.nav-item:hover{background:var(--surface2);}
.nav-item.active{background:rgba(26,86,219,0.07);border-color:rgba(26,86,219,0.18);border-left:3px solid var(--blue);}
.ni-icon{font-size:.86rem;width:18px;text-align:center;flex-shrink:0;}
.ni-label{font-family:'Syne',sans-serif;font-size:.54rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);transition:color .18s;}
.nav-item.active .ni-label,.nav-item:hover .ni-label{color:var(--blue);}
.nav-item.rpt.active{background:rgba(26,86,219,0.07);border-color:rgba(26,86,219,0.18);border-left:3px solid var(--blue);}
.nav-item.rpt.active .ni-label{color:var(--blue);}
.sb-divider{margin:4px 10px;border:none;border-top:1px solid var(--border);}
.sb-sec{padding:6px 14px 2px;font-size:.44rem;text-transform:uppercase;letter-spacing:2px;
  color:rgba(100,116,139,.45);font-family:'Syne',sans-serif;font-weight:700;}

/* ── MAIN ── */
.main-content{margin-left:var(--nav-w);flex:1;padding:22px 26px 80px;position:relative;z-index:1;}
.section{display:none;animation:fadeIn .2s ease;}
.section.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE HEADER ── */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.page-hdr h2{font-family:'Syne',sans-serif;font-size:1.18rem;font-weight:800;color:var(--blue);}
.page-hdr p{font-size:.53rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:3px;}

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:9px;margin-bottom:18px;}
.kpi-box{background:#ffffff;border:1px solid var(--border);border-radius:9px;padding:12px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.kpi-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);}
.kpi-box.blue::before{background:var(--blue);}
.kpi-box.green::before{background:var(--green);}
.kpi-box.amber::before{background:var(--amber);}
.kpi-box.purple::before{background:var(--purple);}
.kpi-box.cyan::before{background:var(--cyan);}
.kpi-icon{font-size:1.1rem;margin-bottom:5px;display:block;}
.kpi-label{font-size:.42rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.kpi-val{font-size:1.55rem;font-weight:500;color:var(--blue);line-height:1;}
.kpi-box.blue .kpi-val{color:var(--blue);}
.kpi-box.green .kpi-val{color:var(--green);}
.kpi-box.amber .kpi-val{color:var(--amber);}
.kpi-box.purple .kpi-val{color:var(--purple);}
.kpi-box.cyan .kpi-val{color:var(--cyan);}

/* ── CARD ── */
.card{background:#ffffff;border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);}
.card.blue::before{background:var(--blue);}
.card.green::before{background:var(--green);}
.card.amber::before{background:var(--amber);}
.card.purple::before{background:var(--purple);}
.card.cyan::before{background:var(--cyan);}
.card.red::before{background:var(--red);}
.card-label{font-family:'Syne',sans-serif;font-size:.51rem;font-weight:700;text-transform:uppercase;
  letter-spacing:2px;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:7px;}

/* ── FIELD GRID ── */
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px;}
.field-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px;transition:border-color .2s;}
.field-item:hover{border-color:rgba(236,72,153,.28);}
.field-item.blue:hover{border-color:rgba(59,130,246,.28);}
.field-item.green:hover{border-color:rgba(52,211,153,.28);}
.field-item.amber:hover{border-color:rgba(245,158,11,.28);}
.field-item.purple:hover{border-color:rgba(167,139,250,.28);}
.field-item.cyan:hover{border-color:rgba(6,182,212,.28);}
.field-item label{display:block;font-size:.48rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;line-height:1.3;}
.field-item input[type=number]{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;font-size:1.35rem;font-weight:500;
  padding:2px 0;outline:none;text-align:center;-moz-appearance:textfield;}
.field-item input::-webkit-outer-spin-button,.field-item input::-webkit-inner-spin-button{-webkit-appearance:none;}
.field-item input:focus{border-bottom-color:var(--rose);}
.field-item.blue input:focus{border-bottom-color:var(--blue);}
.field-item.green input:focus{border-bottom-color:var(--green);}
.field-item.amber input:focus{border-bottom-color:var(--amber);}
.field-item.purple input:focus{border-bottom-color:var(--purple);}
.field-item.cyan input:focus{border-bottom-color:var(--cyan);}
.field-item.read{background:rgba(236,72,153,.05);border-color:rgba(236,72,153,.18);}
.field-item.read input{color:var(--rose);pointer-events:none;font-size:1.4rem;font-weight:700;}
.field-item.read.blue-r{background:rgba(59,130,246,.05);border-color:rgba(59,130,246,.18);}
.field-item.read.blue-r input{color:var(--blue);}
.field-item.read.green-r{background:rgba(52,211,153,.05);border-color:rgba(52,211,153,.18);}
.field-item.read.green-r input{color:var(--green);}

/* ── BLOOD GROUP TABLE ── */
.bg-table{width:100%;border-collapse:collapse;font-size:.72rem;}
.bg-table th{background:var(--surface2);padding:8px 10px;text-align:center;font-family:'Syne',sans-serif;
  font-size:.48rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);}
.bg-table th:first-child{text-align:left;}
.bg-table td{padding:7px 10px;border-bottom:1px solid rgba(29,47,72,.6);text-align:center;}
.bg-table td:first-child{text-align:left;font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;color:var(--text);}
.bg-table input{width:64px;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;text-align:center;
  outline:none;padding:2px 0;-moz-appearance:textfield;}
.bg-table input::-webkit-outer-spin-button,.bg-table input::-webkit-inner-spin-button{-webkit-appearance:none;}
.bg-table input:focus{border-bottom-color:var(--rose);}
.bg-table .total-row td{background:rgba(236,72,153,.08);color:var(--rose);font-weight:700;font-family:'DM Mono',monospace;}
.bg-table tr:hover td{background:var(--surface2);}

/* ── TOTAL BAR ── */
.total-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.t-box{border-radius:6px;padding:8px;text-align:center;}
.t-box.rose{background:rgba(236,72,153,.07);border:1px solid rgba(236,72,153,.18);}
.t-box.blue{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);}
.t-box.green{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);}
.t-box.amber{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);}
.tl{font-size:.44rem;text-transform:uppercase;letter-spacing:1.5px;font-family:'Syne',sans-serif;font-weight:700;display:block;margin-bottom:2px;}
.t-box.rose .tl{color:var(--rose);} .t-box.rose .tv{color:var(--rose);}
.t-box.blue .tl{color:var(--blue);} .t-box.blue .tv{color:var(--blue);}
.t-box.green .tl{color:var(--green);} .t-box.green .tv{color:var(--green);}
.t-box.amber .tl{color:var(--amber);} .t-box.amber .tv{color:var(--amber);}
.tv{font-size:1.5rem;font-weight:500;line-height:1;}

/* ── SERVICE TABS ── */
.svc-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content;}
.svc-tab{padding:8px 18px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.56rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;background:var(--surface2);color:var(--muted);border:none;transition:all .18s;}
.svc-tab.active{background:var(--rose);color:#fff;}
.svc-tab:hover:not(.active){background:var(--surface);color:var(--text);}
.svc-panel{display:none;}.svc-panel.active{display:block;}

/* ── REPORTS ── */
.rpt-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.rpt-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:.5rem;
  font-weight:700;text-transform:uppercase;letter-spacing:2px;font-family:'Syne',sans-serif;}
.rb-day{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.rb-week{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3);}
.rb-month{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
.rb-q{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
.rb-sem{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.3);}
.rb-year{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.3);}
.rb-cmp{background:rgba(236,72,153,.12);color:var(--rose);border:1px solid rgba(236,72,153,.3);}
.rpt-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;}
.period-row{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap;}
.period-row label{font-size:.5rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
.period-row input,.period-row select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:.68rem;padding:6px 10px;border-radius:6px;outline:none;color-scheme:dark;}
.period-row input:focus,.period-row select:focus{border-color:var(--blue);}
.btn-load{padding:7px 14px;background:var(--blue2);color:#fff;border:none;border-radius:6px;
  font-family:'Syne',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.btn-load:hover{opacity:.85;}
.rpt-wrap{overflow-x:auto;}
.rpt-table{width:100%;border-collapse:collapse;font-size:.7rem;}
.rpt-table thead tr{background:var(--surface2);}
.rpt-table th{padding:8px 10px;font-family:'Syne',sans-serif;font-size:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);}
.rpt-table th.r{text-align:right;}
.rpt-table td{padding:7px 10px;border-bottom:1px solid rgba(29,47,72,.5);}
.rpt-table td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;}
.rpt-table td.r.c1{color:var(--rose);}
.rpt-table td.r.c2{color:var(--blue);}
.rpt-table td.r.c3{color:var(--green);}
.rpt-table td.r.c4{color:var(--amber);}
.rpt-table td.r.c5{color:var(--red);}
.rpt-table .tot-row td{font-weight:700;background:rgba(236,72,153,.05);color:var(--rose);}
.rpt-table tbody tr:hover{background:var(--surface2);}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));gap:9px;margin-bottom:14px;}
.sum-card{border-radius:9px;padding:12px;text-align:center;}
.sc1{background:rgba(236,72,153,.09);border:1px solid rgba(236,72,153,.3);}
.sc2{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.25);}
.sc3{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.28);}
.sc4{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.25);}
.sc5{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);}
.s-label{font-size:.44rem;text-transform:uppercase;letter-spacing:1.5px;font-family:'Syne',sans-serif;font-weight:700;display:block;margin-bottom:4px;}
.sc1 .s-label{color:var(--rose);} .sc2 .s-label{color:var(--blue);} .sc3 .s-label{color:var(--green);}
.sc4 .s-label{color:var(--purple);} .sc5 .s-label{color:var(--amber);}
.s-val{font-size:1.7rem;font-weight:500;line-height:1;}
.sc1 .s-val{color:var(--rose);} .sc2 .s-val{color:var(--blue);} .sc3 .s-val{color:var(--green);}
.sc4 .s-val{color:var(--purple);} .sc5 .s-val{color:var(--amber);}
.s-sub{font-size:.5rem;color:var(--muted);margin-top:3px;}
.no-data{text-align:center;padding:36px 20px;color:var(--muted);}
.no-data span{font-size:2rem;display:block;margin-bottom:8px;}
.cmp-boxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px;}
.cmp-box{border-radius:8px;padding:11px;text-align:center;}
.cmp-a{background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.28);}
.cmp-b{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.25);}
.cmp-diff{background:var(--surface2);border:1px solid var(--border);}
.cmp-lbl{font-size:.44rem;text-transform:uppercase;letter-spacing:1.5px;font-family:'Syne',sans-serif;font-weight:700;display:block;margin-bottom:3px;}
.cmp-a .cmp-lbl{color:var(--rose);} .cmp-b .cmp-lbl{color:var(--blue);} .cmp-diff .cmp-lbl{color:var(--muted);}
.cmp-val{font-size:1.65rem;font-weight:500;line-height:1;}
.cmp-a .cmp-val{color:var(--rose);} .cmp-b .cmp-val{color:var(--blue);}
.diff-pos{color:var(--green)!important;font-weight:700;}
.diff-neg{color:var(--red)!important;font-weight:700;}
.diff-neu{color:var(--muted)!important;}
.cmp-side{display:flex;flex-direction:column;gap:6px;background:rgba(236,72,153,.04);border:1px solid rgba(236,72,153,.18);border-radius:7px;padding:9px 13px;}
.cmp-side.b{background:rgba(59,130,246,.04);border-color:rgba(59,130,246,.18);}
.cmp-side-lbl{font-size:.44rem;text-transform:uppercase;letter-spacing:2px;color:var(--rose);font-family:'Syne',sans-serif;font-weight:700;}
.cmp-side.b .cmp-side-lbl{color:var(--blue);}

/* ── TOAST / SAVE BAR ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(236,72,153,.13);border:1px solid rgba(236,72,153,.4);color:var(--rose);
  padding:10px 22px;border-radius:8px;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:.5px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.4);color:var(--green);}
.toast.err{background:rgba(244,63,94,.12);border-color:rgba(244,63,94,.4);color:var(--red);}
.save-bar{position:fixed;bottom:0;left:var(--nav-w);right:0;height:44px;z-index:50;
  background:rgba(7,16,31,.96);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;backdrop-filter:blur(10px);}
.save-status{font-size:.54rem;color:var(--muted);}
.save-status span{color:var(--rose);font-weight:700;}
.as-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;opacity:0;transition:opacity .3s;}
.as-dot.on{opacity:1;animation:pulse .6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:768px){.sidebar{display:none;}.main-content{margin-left:0;}.save-bar{left:0;}}
</style>
</head>
<body>

<header>
  <div class="logo-text">
    <h1>🩸 Hospital do Prenda — Hemoterapia</h1>
    <p>Banco de Sangue · Sector de Transfusões · Informe do Período</p>
  </div>
  <div class="hdr-right">
    <div class="hdr-date">

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const STORAGE_KEY = 'hemo6_';

const SERVICES = [
  {id:'bloco',     label:'Bloco Operatório',   icon:'🔪'},
  {id:'uci',       label:'UCI',                icon:'💊'},
  {id:'urgencias', label:'Banco de Urgências', icon:'🚨'},
  {id:'cirurgia',  label:'Cirurgia Geral',     icon:'🩹'},
  {id:'medicina',  label:'Medicina',           icon:'🫁'},
  {id:'ortopedia', label:'Ortopedia',          icon:'🦴'},
];

const BLOOD_GROUPS = ['ORH+','ORH-','ABRH+','ABRH-','ARH+','ARH-','BRH+','BRH-'];

const OTHER_UNITS = [
  'Instituto Nacional de Sangue','Hospital Militar de Luanda','Hospital Neves Bendinha',
  'Hospital Josina Machel','Américo Boa Vida','Maternidade Lucrécia Paim',
  'Maternidade Augusto Ngangula','Hospital dos Cajueiros','Clínica Girassol',
  'Hospital Kilamba Kiaxi','Hospital Municipal da Samba','Clínica Multiperfil',
  'Hospital Geral de Luanda','HMC','HPDB','Outras unidades'
];

const SEROLOGIA = ['HIV','HBS','HCV','VDRL','AGM','Outras'];

const TRANSFUSOES_TIPOS = ['plaquetas','plasmas','globulos','outras'];
const TRANSFUSOES_LABELS = {
  plaquetas:'1.1 Concentrado Plaquetas',
  plasmas:'1.2 Plasmas',
  globulos:'1.3 Glóbulos Vermelhos',
  outras:'1.4 Outras'
};

const TESTES_KEYS   = ['grupoDador','grupoDoente','provaCompat','transfusoes','gruposEfect','hemoglobinas'];
const TESTES_LABELS = ['Grupo Sanguíneo do Dador','Grupo Sanguíneo do Doente','Prova de Compatibilidade','Transfusões','Grupos Sanguíneos Efectuados','Hemoglobinas'];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentDate = todayISO();
let currentRec  = {};

// ═══════════════════════════════════════════
//  STORAGE  (key = hemo6_YYYY-MM-DD)
// ═══════════════════════════════════════════
function storageKey(d){ return STORAGE_KEY + d; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function slug(s){ return s.replace(/[^a-zA-Z0-9]/g,'-').toLowerCase(); }
function numVal(id){ const e=document.getElementById(id); return e?Number(e.value)||0:0; }
function setVal(id,v){ const e=document.getElementById(id); if(e) e.value=(v??0); }
function setText(id,v){ const e=document.getElementById(id); if(e) e.textContent=(v??0); }
function fmtDate(d){ if(!d||d.length<10) return d; const[y,m,dd]=d.split('-'); return dd+'/'+m+'/'+y; }
function datesInRange(s,e){
  const out=[],cur=new Date(s+'T00:00:00'),end=new Date(e+'T00:00:00');
  while(cur<=end){out.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  return out;
}

function emptyRecord(date){
  const svc={};
  SERVICES.forEach(s=>{svc[s.id]={};BLOOD_GROUPS.forEach(bg=>{svc[s.id][bg]=0;});});
  const ou={};OTHER_UNITS.forEach(u=>{ou[u]=0;});
  const sb={};SEROLOGIA.forEach(k=>{sb[k]=0;});
  const tst={};TESTES_KEYS.forEach(k=>{tst[k]=0;});
  const transf={};TRANSFUSOES_TIPOS.forEach(k=>{transf[k]=0;});
  return {
    date,
    prenda:{
      transfusoes:transf,
      provas:0,colhido:0,consumido:0,perdido:0,
      perdidoPor:{HIV:0,HBS:0,VDRL:0,HCV:0,Outras:0},
      doadores:{voluntarios:0,familiares:0,habituais:0},
      testes:tst,
      serologiaPos:Object.assign({},sb),
      serologiaNeg:Object.assign({},sb),
      otherUnits:ou
    },
    servicos:svc
  };
}

function loadRecord(date){
  const raw=localStorage.getItem(storageKey(date));
  if(!raw) return emptyRecord(date);
  try{
    const parsed=JSON.parse(raw);
    const base=emptyRecord(date);
    if(parsed.prenda){
      const p=parsed.prenda;
      if(p.transfusoes) TRANSFUSOES_TIPOS.forEach(k=>{ base.prenda.transfusoes[k]=p.transfusoes[k]||0; });
      ['provas','colhido','consumido','perdido'].forEach(k=>{ if(p[k]!==undefined) base.prenda[k]=p[k]; });
      if(p.perdidoPor) Object.assign(base.prenda.perdidoPor,p.perdidoPor);
      if(p.doadores)   Object.assign(base.prenda.doadores,p.doadores);
      if(p.testes)     Object.assign(base.prenda.testes,p.testes);
      if(p.serologiaPos) Object.assign(base.prenda.serologiaPos,p.serologiaPos);
      if(p.serologiaNeg) Object.assign(base.prenda.serologiaNeg,p.serologiaNeg);
      if(p.otherUnits)   Object.assign(base.prenda.otherUnits,p.otherUnits);
    }
    if(parsed.servicos){
      SERVICES.forEach(s=>{
        if(parsed.servicos[s.id]){
          BLOOD_GROUPS.forEach(bg=>{ base.servicos[s.id][bg]=parsed.servicos[s.id][bg]||0; });
        }
      });
    }
    return base;
  }catch(e){return emptyRecord(date);}
}
function saveRecord(rec){ localStorage.setItem(storageKey(rec.date),JSON.stringify(rec)); }

// ═══════════════════════════════════════════
//  COLLECT
// ═══════════════════════════════════════════
function collectAll(){
  const p=currentRec.prenda;
  TRANSFUSOES_TIPOS.forEach(k=>{ p.transfusoes[k]=numVal(`transf-${k}`); });
  p.provas=numVal('provas'); p.colhido=numVal('colhido'); p.consumido=numVal('consumido'); p.perdido=numVal('perdido');
  ['HIV','HBS','VDRL','HCV','Outras'].forEach(k=>{ p.perdidoPor[k]=numVal(`ppor-${k}`); });
  ['voluntarios','familiares','habituais'].forEach(k=>{ p.doadores[k]=numVal(`doa-${k}`); });
  TESTES_KEYS.forEach(k=>{ p.testes[k]=numVal(`teste-${k}`); });
  SEROLOGIA.forEach(k=>{ p.serologiaPos[k]=numVal(`spos-${slug(k)}`); p.serologiaNeg[k]=numVal(`sneg-${slug(k)}`); });
  OTHER_UNITS.forEach(u=>{ p.otherUnits[u]=numVal(`ou-${slug(u)}`); });
  SERVICES.forEach(s=>{
    BLOOD_GROUPS.forEach(bg=>{ currentRec.servicos[s.id][bg]=numVal(`${s.id}-${slug(bg)}`); });
  });
}

// ═══════════════════════════════════════════
//  POPULATE
// ═══════════════════════════════════════════
function populateAll(){
  const p=currentRec.prenda;
  TRANSFUSOES_TIPOS.forEach(k=>{ setVal(`transf-${k}`,p.transfusoes?.[k]||0); });
  setVal('provas',p.provas||0); setVal('colhido',p.colhido||0); setVal('consumido',p.consumido||0); setVal('perdido',p.perdido||0);
  ['HIV','HBS','VDRL','HCV','Outras'].forEach(k=>{ setVal(`ppor-${k}`,p.perdidoPor?.[k]||0); });
  ['voluntarios','familiares','habituais'].forEach(k=>{ setVal(`doa-${k}`,p.doadores?.[k]||0); });
  TESTES_KEYS.forEach(k=>{ setVal(`teste-${k}`,p.testes?.[k]||0); });
  SEROLOGIA.forEach(k=>{ setVal(`spos-${slug(k)}`,p.serologiaPos?.[k]||0); setVal(`sneg-${slug(k)}`,p.serologiaNeg?.[k]||0); });
  OTHER_UNITS.forEach(u=>{ setVal(`ou-${slug(u)}`,p.otherUnits?.[u]||0); });
  SERVICES.forEach(s=>{
    BLOOD_GROUPS.forEach(bg=>{ setVal(`${s.id}-${slug(bg)}`,currentRec.servicos?.[s.id]?.[bg]||0); });
  });
  updatePrendaTotals();
  SERVICES.forEach(s=>updateSvcTotals(s.id));
  updateKPIs();
}

// ═══════════════════════════════════════════
//  TOTALS
// ═══════════════════════════════════════════
function updatePrendaTotals(){
  const tT=TRANSFUSOES_TIPOS.reduce((a,k)=>a+numVal(`transf-${k}`),0);
  setText('transf-tot',tT);
  setText('saldo-val',numVal('colhido')-numVal('consumido')-numVal('perdido'));
  setText('doa-total',numVal('doa-voluntarios')+numVal('doa-familiares')+numVal('doa-habituais'));
  setText('ppor-total',['HIV','HBS','VDRL','HCV','Outras'].reduce((a,k)=>a+numVal(`ppor-${k}`),0));
  setText('teste-total',TESTES_KEYS.reduce((a,k)=>a+numVal(`teste-${k}`),0));
  setText('ou-total',OTHER_UNITS.reduce((a,u)=>a+numVal(`ou-${slug(u)}`),0));
  SEROLOGIA.forEach(k=>{
    setText(`stot-${slug(k)}`,numVal(`spos-${slug(k)}`)+numVal(`sneg-${slug(k)}`));
  });
  const posT=SEROLOGIA.reduce((a,k)=>a+numVal(`spos-${slug(k)}`),0);
  const negT=SEROLOGIA.reduce((a,k)=>a+numVal(`sneg-${slug(k)}`),0);
  setText('serol-pos-tot',posT); setText('serol-neg-tot',negT); setText('serol-all-tot',posT+negT);
  updateKPIs();
}

function updateSvcTotals(id){
  const tot=BLOOD_GROUPS.reduce((a,bg)=>a+numVal(`${id}-${slug(bg)}`),0);
  setText(`${id}-tot`,tot);
}

function updateKPIs(){
  const tT=TRANSFUSOES_TIPOS.reduce((a,k)=>a+numVal(`transf-${k}`),0);
  setText('kpi-transf',tT);
  setText('kpi-provas',numVal('provas'));
  setText('kpi-colhido',numVal('colhido'));
  setText('kpi-consumido',numVal('consumido'));
  setText('kpi-doadores',numVal('doa-voluntarios')+numVal('doa-familiares')+numVal('doa-habituais'));
  setText('kpi-testes',TESTES_KEYS.reduce((a,k)=>a+numVal(`teste-${k}`),0));
}

// ═══════════════════════════════════════════
//  BUILD HTML
// ═══════════════════════════════════════════
function nf(id,label,color,cb){
  return `<div class="field-item ${color}"><label>${label}</label>
    <input type="number" min="0" id="${id}" placeholder="0" oninput="${cb}()"></div>`;
}
function rf(id,label,colorClass){
  return `<div class="field-item read ${colorClass}"><label>${label}</label>
    <input type="number" readonly id="${id}" value="0"></div>`;
}
function rdtxt(id,label,colorClass,color){
  return `<div class="field-item read ${colorClass}"><label>${label}</label>
    <div style="font-family:'DM Mono',monospace;font-size:1.35rem;font-weight:700;text-align:center;padding:4px 0;color:${color}" id="${id}">0</div></div>`;
}

function buildPrenda(){
  let h=`<div class="section" id="sec-prenda">
  <div class="page-hdr">
    <div><h2>🏥 Saúde Pública — Hospital do Prenda</h2>
      <p>Banco de Sangue · Hemoterapia · Maianga · Luanda</p></div>
  </div>
  <div class="kpi-strip">
    <div class="kpi-box"><span class="kpi-icon">🩸</span><div class="kpi-label">Total Transfusões</div><div class="kpi-val" id="kpi-transf">0</div></div>
    <div class="kpi-box blue"><span class="kpi-icon">🧪</span><div class="kpi-label">Provas Compat.</div><div class="kpi-val" id="kpi-provas">0</div></div>
    <div class="kpi-box green"><span class="kpi-icon">💉</span><div class="kpi-label">Colhido (cc)</div><div class="kpi-val" id="kpi-colhido">0</div></div>
    <div class="kpi-box amber"><span class="kpi-icon">📤</span><div class="kpi-label">Consumido (cc)</div><div class="kpi-val" id="kpi-consumido">0</div></div>
    <div class="kpi-box purple"><span class="kpi-icon">👥</span><div class="kpi-label">Total Doadores</div><div class="kpi-val" id="kpi-doadores">0</div></div>
    <div class="kpi-box cyan"><span class="kpi-icon">🔬</span><div class="kpi-label">Testes Imuno.</div><div class="kpi-val" id="kpi-testes">0</div></div>
  </div>

  <!-- 1. TRANSFUSÕES -->
  <div class="card">
    <div class="card-label">🩸 1. Transfusões</div>
    <div class="field-grid">`;
  TRANSFUSOES_TIPOS.forEach(k=>{
    h+=nf(`transf-${k}`,TRANSFUSOES_LABELS[k],'','updatePrendaTotals');
  });
  h+=`<div class="field-item read">
    <label>1.5 Total Transfusões</label>
    <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;text-align:center;padding:4px 0;color:var(--rose)" id="transf-tot">0</div>
    </div>
    </div>
  </div>

  <!-- 2–5. PROVAS / SANGUE -->
  <div class="card blue">
    <div class="card-label">🧪 2–5. Provas de Compatibilidade & Movimento de Sangue</div>
    <div class="field-grid">
      ${nf('provas','2. Provas de Compatibilidade','blue','updatePrendaTotals')}
      ${nf('colhido','3. Sangue Colhido (cc)','blue','updatePrendaTotals')}
      ${nf('consumido','4. Sangue Consumido (cc)','blue','updatePrendaTotals')}
      ${nf('perdido','5. Sangue Perdido (cc)','blue','updatePrendaTotals')}
      ${rdtxt('saldo-val','Saldo (Colhido − Consumido − Perdido)','read blue-r','var(--blue)')}
    </div>
    <div style="margin-top:14px;">
      <div style="font-family:'Syne',sans-serif;font-size:.48rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:9px;">5a. Sangue Perdido por Causa (cc)</div>
      <div class="field-grid">`;
  ['HIV','HBS','VDRL','HCV','Outras'].forEach(k=>{
    h+=nf(`ppor-${k}`,k,'','updatePrendaTotals');
  });
  h+=`${rdtxt('ppor-total','Total Perdido por Causa','read','var(--rose)')}
      </div>
    </div>
  </div>

  <!-- 6. DOADORES -->
  <div class="card amber">
    <div class="card-label">👥 6. Doadores</div>
    <div class="field-grid">
      ${nf('doa-voluntarios','6.1 Voluntários','amber','updatePrendaTotals')}
      ${nf('doa-familiares','6.2 Familiares','amber','updatePrendaTotals')}
      ${nf('doa-habituais','6.3 Habituais','amber','updatePrendaTotals')}
      ${rdtxt('doa-total','6.4 Total Doadores','read','var(--amber)')}
    </div>
  </div>

  <!-- TESTES IMUNOHEMATOLOGIA -->
  <div class="card purple">
    <div class="card-label">🔬 Testes de Imunohematologia</div>
    <div class="field-grid">`;
  TESTES_KEYS.forEach((k,i)=>{
    h+=nf(`teste-${k}`,TESTES_LABELS[i],'purple','updatePrendaTotals');
  });
  h+=`${rdtxt('teste-total','Total Geral','read','var(--purple)')}
    </div>
  </div>

  <!-- SEROLOGIA -->
  <div class="card">
    <div class="card-label">🧬 Análises Serológicas — Sangue Hospital do Prenda</div>
    <div class="rpt-wrap"><table class="rpt-table">
      <thead><tr>
        <th>Teste</th>
        <th class="r" style="color:var(--red)">Positivos</th>
        <th class="r" style="color:var(--green)">Negativos</th>
        <th class="r">Total</th>
      </tr></thead><tbody>`;
  SEROLOGIA.forEach(k=>{
    h+=`<tr>
      <td>${k}</td>
      <td class="r"><input type="number" min="0" id="spos-${slug(k)}" placeholder="0" oninput="updatePrendaTotals()"
        style="width:70px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--red);font-family:'DM Mono',monospace;font-size:.9rem;text-align:center;outline:none;-moz-appearance:textfield;"></td>
      <td class="r"><input type="number" min="0" id="sneg-${slug(k)}" placeholder="0" oninput="updatePrendaTotals()"
        style="width:70px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--green);font-family:'DM Mono',monospace;font-size:.9rem;text-align:center;outline:none;-moz-appearance:textfield;"></td>
      <td class="r" id="stot-${slug(k)}" style="font-weight:700;">0</td>

  });
  h+=`<tr class="tot-row"><td>TOTAL</td>

    <td class="r" id="serol-all-tot">0</td>
    </tr></tbody></table></div>

    <div class="field-grid">`;
  OTHER_UNITS.forEach(u=>{
    h+=nf(`ou-${slug(u)}`,u,'cyan','updatePrendaTotals');
  });
  h+=`${rdtxt('ou-total','Total Unidades Externas','read','var(--cyan)')}
    </div>
  </div>
</div>`;
  return h;
}

function buildReports(){
  const NW=`style="width:82px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.68rem;padding:6px 10px;border-radius:6px;outline:none;"`;

// ═══════════════════════════════════════════
//  AGGREGATE
// ═══════════════════════════════════════════
function aggregate(dates){
  const a={
    transf:{},provas:0,colhido:0,consumido:0,perdido:0,
    perdidoPor:{HIV:0,HBS:0,VDRL:0,HCV:0,Outras:0},
    doadores:{voluntarios:0,familiares:0,habituais:0},
    testes:{},serologiaPos:{},serologiaNeg:{},otherUnits:{},servicos:{},days:0
  };
  TRANSFUSOES_TIPOS.forEach(k=>{a.transf[k]=0;});
  TESTES_KEYS.forEach(k=>{a.testes[k]=0;});
  SEROLOGIA.forEach(k=>{a.serologiaPos[k]=0;a.serologiaNeg[k]=0;});
  OTHER_UNITS.forEach(u=>{a.otherUnits[u]=0;});
  SERVICES.forEach(s=>{a.servicos[s.id]={};BLOOD_GROUPS.forEach(bg=>{a.servicos[s.id][bg]=0;});});

  dates.forEach(date=>{
    const raw=localStorage.getItem(storageKey(date));
    if(!raw) return;
    try{
      const rec=JSON.parse(raw); a.days++;
      const p=rec.prenda||{};
      TRANSFUSOES_TIPOS.forEach(k=>{a.transf[k]+=p.transfusoes?.[k]||0;});
      a.provas+=p.provas||0; a.colhido+=p.colhido||0; a.consumido+=p.consumido||0; a.perdido+=p.perdido||0;
      ['HIV','HBS','VDRL','HCV','Outras'].forEach(k=>{a.perdidoPor[k]+=p.perdidoPor?.[k]||0;});
      ['voluntarios','familiares','habituais'].forEach(k=>{a.doadores[k]+=p.doadores?.[k]||0;});
      TESTES_KEYS.forEach(k=>{a.testes[k]+=p.testes?.[k]||0;});
      SEROLOGIA.forEach(k=>{a.serologiaPos[k]+=p.serologiaPos?.[k]||0; a.serologiaNeg[k]+=p.serologiaNeg?.[k]||0;});
      OTHER_UNITS.forEach(u=>{a.otherUnits[u]+=p.otherUnits?.[u]||0;});
      SERVICES.forEach(s=>{BLOOD_GROUPS.forEach(bg=>{a.servicos[s.id][bg]+=rec.servicos?.[s.id]?.[bg]||0;});});
    }catch(e){}
  });
  a.tT=TRANSFUSOES_TIPOS.reduce((s,k)=>s+a.transf[k],0);
  a.totDoa=a.doadores.voluntarios+a.doadores.familiares+a.doadores.habituais;
  a.saldo=a.colhido-a.consumido-a.perdido;
  a.totTestes=TESTES_KEYS.reduce((s,k)=>s+a.testes[k],0);
  return a;
}

function renderReport(containerId,dates,title){
  const a=aggregate(dates);
  const el=document.getElementById(containerId);if(!el) return;
  if(a.days===0&&a.tT===0){el.innerHTML=`<div class="no-data"><span>📭</span>Sem dados para este período.</div>`;return;}
  let h=`<div class="sum-grid">
    <div class="sum-card sc1"><span class="s-label">Total Transfusões</span><span class="s-val">${a.tT}</span><div class="s-sub">${title}</div></div>
    <div class="sum-card sc3"><span class="s-label">Sangue Colhido (cc)</span><span class="s-val">${a.colhido}</span><div class="s-sub">Saldo: ${a.saldo}</div></div>
    <div class="sum-card sc5"><span class="s-label">Total Doadores</span><span class="s-val">${a.totDoa}</span></div>
    <div class="sum-card sc4"><span class="s-label">Testes Imuno.</span><span class="s-val">${a.totTestes}</span></div>
    <div class="sum-card sc2"><span class="s-label">Provas Compat.</span><span class="s-val">${a.provas}</span></div>
    <div class="sum-card" style="background:rgba(100,116,139,.07);border:1px solid rgba(100,116,139,.2)"><span class="s-label" style="color:var(--muted)">Dias com dados</span><span class="s-val" style="color:var(--muted)">${a.days}</span></div>
  </div>`;

  // Transfusões
  h+=`<div class="card"><div class="card-label">🩸 Transfusões por Tipo</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr><th>Tipo</th><th class="r">Quantidade</th></tr></thead><tbody>`;
  TRANSFUSOES_TIPOS.forEach(k=>{if(a.transf[k]>0) h+=`<tr><td>${k.charAt(0).toUpperCase()+k.slice(1)}</td><td class="r c1">${a.transf[k]}</td></tr>`;});
  h+=`<tr class="tot-row"><td>TOTAL</td><td class="r">${a.tT}</td></tr></tbody></table></div></div>`;

  // Sangue
  h+=`<div class="card blue"><div class="card-label">🧪 Provas & Sangue</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr><th>Indicador</th><th class="r">Valor</th></tr></thead><tbody>
    <tr><td>Provas de Compatibilidade</td><td class="r c2">${a.provas}</td></tr>
    <tr><td>Sangue Colhido (cc)</td><td class="r">${a.colhido}</td></tr>
    <tr><td>Sangue Consumido (cc)</td><td class="r">${a.consumido}</td></tr>
    <tr><td>Sangue Perdido (cc)</td><td class="r c5">${a.perdido}</td></tr>
    <tr class="tot-row"><td>Saldo</td><td class="r">${a.saldo}</td></tr>
    </tbody></table></div></div>`;

  // Perdido por causa
  const ppT=Object.values(a.perdidoPor).reduce((s,v)=>s+v,0);
  if(ppT>0){
    h+=`<div class="card red"><div class="card-label">⚠️ Sangue Perdido por Causa</div>
      <div class="rpt-wrap"><table class="rpt-table"><thead><tr><th>Causa</th><th class="r">cc</th></tr></thead><tbody>`;
    ['HIV','HBS','VDRL','HCV','Outras'].forEach(k=>{if(a.perdidoPor[k]>0) h+=`<tr><td>${k}</td><td class="r c5">${a.perdidoPor[k]}</td></tr>`;});
    h+=`<tr class="tot-row"><td>TOTAL</td><td class="r">${ppT}</td></tr></tbody></table></div></div>`;
  }

  // Doadores
  h+=`<div class="card amber"><div class="card-label">👥 Doadores</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr><th>Categoria</th><th class="r">Total</th></tr></thead><tbody>
    <tr><td>Voluntários</td><td class="r">${a.doadores.voluntarios}</td></tr>
    <tr><td>Familiares</td><td class="r">${a.doadores.familiares}</td></tr>
    <tr><td>Habituais</td><td class="r">${a.doadores.habituais}</td></tr>
    <tr class="tot-row"><td>TOTAL</td><td class="r">${a.totDoa}</td></tr>
    </tbody></table></div></div>`;

  // Serologia
  const sTot=SEROLOGIA.reduce((s,k)=>s+a.serologiaPos[k]+a.serologiaNeg[k],0);
  if(sTot>0){
    h+=`<div class="card"><div class="card-label">🧬 Análises Serológicas</div>
      <div class="rpt-wrap"><table class="rpt-table"><thead><tr>
        <th>Teste</th><th class="r" style="color:var(--red)">Positivos</th><th class="r" style="color:var(--green)">Negativos</th><th class="r">Total</th>
      </tr></thead><tbody>`;
    SEROLOGIA.forEach(k=>{
      const pos=a.serologiaPos[k],neg=a.serologiaNeg[k];
      if(pos+neg>0) h+=`<tr><td>${k}</td><td class="r c5">${pos}</td><td class="r c3">${neg}</td><td class="r">${pos+neg}</td></tr>`;
    });
    const posT=SEROLOGIA.reduce((s,k)=>s+a.serologiaPos[k],0);
    const negT=SEROLOGIA.reduce((s,k)=>s+a.serologiaNeg[k],0);
    h+=`<tr class="tot-row"><td>TOTAL</td><td class="r c5">${posT}</td><td class="r c3">${negT}</td><td class="r">${posT+negT}</td></tr>`;
    h+=`</tbody></table></div></div>`;
  }

  // Testes
  h+=`<div class="card purple"><div class="card-label">🔬 Testes de Imunohematologia</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr><th>Teste</th><th class="r">Total</th></tr></thead><tbody>`;
  TESTES_KEYS.forEach((k,i)=>{if(a.testes[k]>0) h+=`<tr><td>${TESTES_LABELS[i]}</td><td class="r">${a.testes[k]}</td></tr>`;});
  h+=`<tr class="tot-row"><td>TOTAL</td><td class="r">${a.totTestes}</td></tr></tbody></table></div></div>`;

  // Serviços
  h+=`<div class="card cyan"><div class="card-label">🏥 Transfusões por Serviço</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr><th>Serviço</th><th class="r">Transfusões</th></tr></thead><tbody>`;
  let sTot2=0;
  SERVICES.forEach(s=>{
    const tot=BLOOD_GROUPS.reduce((t,bg)=>t+(a.servicos[s.id]?.[bg]||0),0);
    sTot2+=tot;
    if(tot>0) h+=`<tr><td>${s.icon} ${s.label}</td><td class="r c2">${tot}</td></tr>`;
  });
  h+=`<tr class="tot-row"><td>TOTAL</td><td class="r">${sTot2}</td></tr></tbody></table></div></div>`;

  el.innerHTML=h;
}

function renderSvcRpt(svcId){
  const s=document.getElementById(`${svcId}-rs`).value,e=document.getElementById(`${svcId}-re`).value;
  if(!s||!e){showToast('⚠️ Seleccione o período','err');return;}
  const a=aggregate(datesInRange(s,e));
  const svc=SERVICES.find(v=>v.id===svcId);
  let tot=0;
  const rows=BLOOD_GROUPS.map(bg=>{const v=a.servicos[svcId]?.[bg]||0;tot+=v;return{bg,v};});
  let h=`<div class="sum-grid">
    <div class="sum-card sc1"><span class="s-label">Total Transfusões</span><span class="s-val">${tot}</span></div>
    <div class="sum-card" style="background:rgba(100,116,139,.07);border:1px solid rgba(100,116,139,.2)"><span class="s-label" style="color:var(--muted)">Dias com dados</span><span class="s-val" style="color:var(--muted)">${a.days}</span></div>
  </div>`;
  h+=`<div class="card"><div class="card-label">${svc.icon} ${svc.label} · ${fmtDate(s)} – ${fmtDate(e)}</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr>
      <th>Grupo Sanguíneo</th><th class="r">Transfusões</th>
    </tr></thead><tbody>`;
  rows.forEach(r=>{if(r.v>0) h+=`<tr><td>${r.bg}</td><td class="r c1">${r.v}</td></tr>`;});
  h+=`<tr class="tot-row"><td>TOTAL</td><td class="r">${tot}</td></tr></tbody></table></div></div>`;
  document.getElementById(`${svcId}-rpt-out`).innerHTML=h;
}

function loadRpt(type){
  const f=n=>String(n).padStart(2,'0');
  if(type==='dia'){
    const d=document.getElementById('rpd-date').value;
    if(!d){showToast('⚠️ Seleccione a data','err');return;}
    renderReport('rpt-dia-out',[d],fmtDate(d));
  } else if(type==='semanal'){
    const s=document.getElementById('rpw-s').value,e=document.getElementById('rpw-e').value;
    if(!s||!e){showToast('⚠️ Seleccione o intervalo','err');return;}
    renderReport('rpt-semanal-out',datesInRange(s,e),`${fmtDate(s)} – ${fmtDate(e)}`);
  } else if(type==='mensal'){
    const m=document.getElementById('rpm-month').value;
    if(!m){showToast('⚠️ Seleccione o mês','err');return;}
    const [y,mo]=m.split('-');const last=new Date(+y,+mo,0).getDate();
    renderReport('rpt-mensal-out',datesInRange(`${m}-01`,`${m}-${f(last)}`),m);
  } else if(type==='trimestral'){
    const y=document.getElementById('rpq-year').value,q=parseInt(document.getElementById('rpq-q').value);
    if(!y){showToast('⚠️ Indique o ano','err');return;}
    const S=[[1,1],[4,1],[7,1],[10,1]],E=[[3,31],[6,30],[9,30],[12,31]];
    renderReport('rpt-trimestral-out',datesInRange(`${y}-${f(S[q-1][0])}-${f(S[q-1][1])}`,`${y}-${f(E[q-1][0])}-${f(E[q-1][1])}`),`T${q}/${y}`);
  } else if(type==='semestral'){
    const y=document.getElementById('rps-year').value,h2=parseInt(document.getElementById('rps-h').value);
    if(!y){showToast('⚠️ Indique o ano','err');return;}
    renderReport('rpt-semestral-out',datesInRange(h2===1?`${y}-01-01`:`${y}-07-01`,h2===1?`${y}-06-30`:`${y}-12-31`),`S${h2}/${y}`);
  } else if(type==='anual'){
    const y=document.getElementById('rpa-year').value;
    if(!y){showToast('⚠️ Indique o ano','err');return;}
    renderReport('rpt-anual-out',datesInRange(`${y}-01-01`,`${y}-12-31`),`Ano ${y}`);
  }
}

function loadCmp(){
  const as=document.getElementById('cmp-as').value,ae=document.getElementById('cmp-ae').value;
  const bs=document.getElementById('cmp-bs').value,be=document.getElementById('cmp-be').value;
  if(!as||!ae||!bs||!be){showToast('⚠️ Preencha os dois períodos','err');return;}
  const A=aggregate(datesInRange(as,ae)),B=aggregate(datesInRange(bs,be));
  const diff=B.tT-A.tT,pct=A.tT>0?((diff/A.tT)*100).toFixed(1):'—';
  const dc=diff>0?'diff-pos':diff<0?'diff-neg':'diff-neu',sign=diff>0?'+':'';
  let h=`<div class="cmp-boxes">
    <div class="cmp-box cmp-a"><span class="cmp-lbl">🟣 ${fmtDate(as)}${as!==ae?' – '+fmtDate(ae):''}</span><span class="cmp-val">${A.tT}</span></div>
    <div class="cmp-box cmp-b"><span class="cmp-lbl">🔵 ${fmtDate(bs)}${bs!==be?' – '+fmtDate(be):''}</span><span class="cmp-val">${B.tT}</span></div>
    <div class="cmp-box cmp-diff"><span class="cmp-lbl">Δ Variação</span><span class="cmp-val ${dc}">${sign}${diff}</span><small class="${dc}" style="font-size:.6rem;">${pct!=='—'?sign+pct+'%':'—'}</small></div>
  </div>`;
  const inds=[
    {l:'Transfusões Total',a:A.tT,b:B.tT},{l:'Provas Compatibilidade',a:A.provas,b:B.provas},
    {l:'Sangue Colhido (cc)',a:A.colhido,b:B.colhido},{l:'Sangue Consumido (cc)',a:A.consumido,b:B.consumido},
    {l:'Sangue Perdido (cc)',a:A.perdido,b:B.perdido},{l:'Total Doadores',a:A.totDoa,b:B.totDoa},
    {l:'Testes Imunohematologia',a:A.totTestes,b:B.totTestes},
  ];
  h+=`<div class="card"><div class="card-label">Comparação por Indicador</div>
    <div class="rpt-wrap"><table class="rpt-table"><thead><tr>
      <th>Indicador</th><th class="r" style="color:var(--rose)">🟣 A</th><th class="r" style="color:var(--blue)">🔵 B</th><th class="r">Δ</th><th class="r">%</th>
    </tr></thead><tbody>`;
  inds.forEach(({l,a,b})=>{
    const d=b-a,p=a>0?((d/a)*100).toFixed(1):'—';
    const dc2=d>0?'diff-pos':d<0?'diff-neg':'diff-neu';
    h+=`<tr><td>${l}</td><td class="r c1">${a}</td><td class="r c2">${b}</td>
      <td class="r ${dc2}">${d>0?'+':''}${d}</td>
      <td class="r ${dc2}">${p!=='—'?(d>0?'+':'')+p+'%':p}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('rpt-cmp-out').innerHTML=h;
}

function showView(viewId,el){

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const sec=document.getElementById(`sec-${viewId}`);if(sec) sec.classList.add('active');
  if(el) el.classList.add('active');
  else document.querySelectorAll(`.nav-item[data-view="${viewId}"]`).forEach(n=>n.classList.add('active'));
}
function switchSvcTab(wid,tab,btn){
  document.querySelectorAll(`#sec-${wid} .svc-tab`).forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`#sec-${wid} .svc-panel`).forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`${wid}-p${tab}`).classList.add('active');
}

function saveAll(){
  collectAll();currentRec.date=currentDate;saveRecord(currentRec);
  showToast('💾 Dados guardados!','ok');
  document.getElementById('sync-info').textContent='✅ Guardado '+new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
  const dot=document.getElementById('as-dot');dot.classList.add('on');setTimeout(()=>dot.classList.remove('on'),1200);
  document.getElementById('save-date-lbl').textContent=fmtDate(currentDate);
}
function loadDate(date){
  collectAll();saveRecord(currentRec);
  currentDate=date;currentRec=loadRecord(date);
  document.getElementById('save-date-lbl').textContent=fmtDate(date);
  populateAll();
}

function doBackup(){
  const all={};
  Object.keys(localStorage).forEach(k=>{if(k.startsWith(STORAGE_KEY))try{all[k]=JSON.parse(localStorage.getItem(k));}catch(e){}});
  const blob=new Blob([JSON.stringify({version:'hemo6',exported:new Date().toISOString(),data:all},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`backup_hemoterapia_${todayISO()}.json`;a.click();URL.revokeObjectURL(a.href);
  showToast('⬇️ Backup exportado!','ok');
}
function restoreFromFile(input){
  const file=input.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const json=JSON.parse(e.target.result);const data=json.data||json;
      let count=0;
      Object.entries(data).forEach(([k,v])=>{if(k.startsWith(STORAGE_KEY)){localStorage.setItem(k,JSON.stringify(v));count++;}});
      loadDate(currentDate);showToast(`✅ ${count} registos restaurados!`,'ok');
    }catch(err){showToast('❌ Erro ao importar','err');}
  };
  reader.readAsText(file);input.value='';
}

function exportPDF(){
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  const p=currentRec.prenda;
  doc.setFontSize(16);doc.setTextColor(157,23,77);
  doc.text('Hospital do Prenda — Hemoterapia',15,18);
  doc.setFontSize(10);doc.setTextColor(80,80,80);
  doc.text(`Data: ${fmtDate(currentDate)}    Gerado: ${new Date().toLocaleString('pt-PT')}`,15,26);
  doc.setDrawColor(236,72,153);doc.setLineWidth(.5);doc.line(15,29,195,29);
  const rows=[];
  TRANSFUSOES_TIPOS.forEach(k=>{rows.push([`Transfusões – ${k.charAt(0).toUpperCase()+k.slice(1)}`,p.transfusoes?.[k]||0]);});
  rows.push(['TOTAL TRANSFUSÕES',TRANSFUSOES_TIPOS.reduce((s,k)=>s+(p.transfusoes?.[k]||0),0)]);
  rows.push(['Provas de Compatibilidade',p.provas||0]);
  rows.push(['Sangue Colhido (cc)',p.colhido||0]);
  rows.push(['Sangue Consumido (cc)',p.consumido||0]);
  rows.push(['Sangue Perdido (cc)',p.perdido||0]);
  rows.push(['Saldo (cc)',(p.colhido||0)-(p.consumido||0)-(p.perdido||0)]);
  rows.push(['Doadores Voluntários',p.doadores?.voluntarios||0]);
  rows.push(['Doadores Familiares',p.doadores?.familiares||0]);
  rows.push(['Doadores Habituais',p.doadores?.habituais||0]);
  rows.push(['TOTAL DOADORES',(p.doadores?.voluntarios||0)+(p.doadores?.familiares||0)+(p.doadores?.habituais||0)]);
  doc.autoTable({head:[['Indicador','Valor']],body:rows,startY:33,
    styles:{fontSize:9},headStyles:{fillColor:[157,23,77]},alternateRowStyles:{fillColor:[253,242,248]}});
  const svcRows=[];
  SERVICES.forEach(s=>{
    const tot=BLOOD_GROUPS.reduce((t,bg)=>t+(currentRec.servicos?.[s.id]?.[bg]||0),0);
    if(tot>0) svcRows.push([s.label,tot]);
  });
  if(svcRows.length>0){
    const y=doc.lastAutoTable.finalY+8;
    doc.setFontSize(11);doc.setTextColor(30,64,175);doc.text('Transfusões por Serviço',15,y);
    doc.autoTable({head:[['Serviço','Transfusões']],body:svcRows,startY:y+4,
      styles:{fontSize:9},headStyles:{fillColor:[30,64,175]},alternateRowStyles:{fillColor:[239,246,255]}});
  }
  doc.setFontSize(8);doc.setTextColor(160,160,160);
  doc.text('Hospital do Prenda · Luanda · Angola',15,doc.internal.pageSize.height-8);
  doc.save(`hemoterapia_${currentDate}.pdf`);
  showToast('📄 PDF gerado!','ok');
}

let _tt;
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');
  void t.offsetWidth;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init(){
  let html=buildPrenda();
  SERVICES.forEach(s=>{html+=buildService(s);});
  html+=buildReports();
  document.getElementById('main-content').innerHTML=html;

  const nav=document.getElementById('svc-nav');
  SERVICES.forEach(s=>{
    const d=document.createElement('div');
    d.className='nav-item';d.dataset.view=s.id;
    d.innerHTML=`<span class="ni-icon">${s.icon}</span><span class="ni-label">${s.label}</span>`;
    d.onclick=function(){showView(s.id,this);};
    nav.appendChild(d);
  });

  const today=todayISO(),mn=today.slice(0,7);
  const [y,m]=mn.split('-'),last=new Date(+y,+m,0).getDate();
  SERVICES.forEach(s=>{
    const e1=document.getElementById(`${s.id}-rs`),e2=document.getElementById(`${s.id}-re`);
    if(e1)e1.value=mn+'-01';if(e2)e2.value=mn+'-'+String(last).padStart(2,'0');
  });

  const regDate=document.getElementById('regDate');
  regDate.value=currentDate;
  regDate.onchange=()=>loadDate(regDate.value);

  const yr=new Date().getFullYear(),mo=new Date().getMonth()+1;
  document.getElementById('rpd-date').value=today;
  document.getElementById('rpw-s').value=today;document.getElementById('rpw-e').value=today;
  document.getElementById('rpm-month').value=today.slice(0,7);
  document.getElementById('rpq-year').value=yr;document.getElementById('rpq-q').value=Math.ceil(mo/3);
  document.getElementById('rps-year').value=yr;document.getElementById('rps-h').value=mo<=6?1:2;
  document.getElementById('rpa-year').value=yr;
  document.getElementById('cmp-as').value=today;document.getElementById('cmp-ae').value=today;
  document.getElementById('cmp-bs').value=today;document.getElementById('cmp-be').value=today;

  currentRec=loadRecord(currentDate);
  populateAll();
  document.getElementById('save-date-lbl').textContent=fmtDate(currentDate);

  setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-PT');},1000);
  showView('prenda',document.querySelector('.nav-item[data-view="prenda"]'));
}

document.addEventListener('DOMContentLoaded',init);
